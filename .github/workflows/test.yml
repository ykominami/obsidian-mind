name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.claude/scripts/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - '.claude/scripts/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install typecheck deps (CI-only, not shipped)
        shell: bash
        run: npm install --no-save --silent --prefix .claude/scripts typescript@5.6.3 @types/node@22.9.0
      - name: Install qmd globally (proves MCP wrapper resolution on this OS)
        shell: bash
        run: npm install -g @tobilu/qmd@2.1.0
      - name: Typecheck
        shell: bash
        working-directory: .claude/scripts
        run: npm run typecheck
      - name: Run hook tests
        working-directory: .claude/scripts
        run: npm test

