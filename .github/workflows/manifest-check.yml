name: Manifest Check

on:
  pull_request:
    paths:
      # Template infrastructure surfaces the script walks — if these change
      # we need to verify every file is still covered by a manifest glob.
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/scripts/**'
      - '.claude-plugin/**'
      - '.codex/**'
      - '.gemini/**'
      - 'templates/**'
      - 'bases/**'
      # Root-level template files (allowlisted in manifest-check.ts). A PR
      # that adds any of these without a matching manifest entry should
      # trigger a warning — the .mcp.json addition in #48 slipped through
      # precisely because root files weren't watched.
      - '*.md'
      - '.mcp.json'
      - '.gitignore'
      - 'LICENSE'
      - 'obsidian-mind-logo.png'
      - 'obsidian-mind-demo.gif'
      - 'vault-manifest.json'
      - '.github/scripts/manifest-check.ts'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check manifest coverage
        run: node --experimental-strip-types .github/scripts/manifest-check.ts
